name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AtoZClinical.Web/AtoZClinical.Web.csproj

      - name: Build
        run: dotnet build AtoZClinical.Web/AtoZClinical.Web.csproj -c Release --no-restore

      - name: Test
        run: dotnet test AtoZClinical.Tests/AtoZClinical.Tests.csproj -c Release --verbosity normal

  validate-blueprint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Render CLI
        run: |
          curl -fsSL -o render.zip https://github.com/render-oss/cli/releases/download/v2.19.0/cli_2.19.0_linux_amd64.zip
          unzip render.zip
          sudo install -m 0755 cli_v2.19.0 /usr/local/bin/render
          render --version

      - name: Validate render.yaml
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY not configured — skipping blueprint validation"
            exit 0
          fi
          render blueprints validate render.yaml

  deploy-production:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger Render production deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK_URL not configured — skipping production deploy hook"
          fi

  deploy-staging:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger Render staging deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK"
          else
            echo "RENDER_STAGING_DEPLOY_HOOK_URL not configured — skipping staging deploy hook"
          fi
