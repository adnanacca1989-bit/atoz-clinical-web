name: Security Scan

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AtoZClinical.Web/AtoZClinical.Web.csproj

      - name: Build
        run: dotnet build AtoZClinical.Web/AtoZClinical.Web.csproj -c Release --no-restore

      - name: OWASP ZAP baseline (optional)
        continue-on-error: true
        run: |
          echo "ZAP baseline skipped in CI — no running app URL on GitHub runners."
          echo "Run manually against staging/production when needed."
