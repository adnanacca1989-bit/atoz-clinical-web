# Render.com — staging environment (Phase 4)
# Apply as a second Blueprint or merge into your Render project manually.
services:
  - type: web
    name: atoz-clinical-staging
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      - key: Database__Provider
        value: PostgreSQL
      - key: ConnectionStrings__ClinicalDatabase
        fromDatabase:
          name: atoz-clinical-staging-db
          property: connectionString
      - key: Seed__VendorUsername
        value: vendor
      - key: Seed__VendorPassword
        generateValue: true
      - key: App__PublicBaseUrl
        value: https://atoz-clinical-staging.onrender.com
      - key: AllowedHosts
        value: atoz-clinical-staging.onrender.com;*.onrender.com
      - key: Billing__Enabled
        value: "false"
      - key: Email__Enabled
        value: "false"
      - key: Captcha__Enabled
        value: "false"
      - key: Operations__HealthToken
        generateValue: true

databases:
  - name: atoz-clinical-staging-db
    plan: starter
    databaseName: atoz_clinical_staging
    user: atoz_staging
