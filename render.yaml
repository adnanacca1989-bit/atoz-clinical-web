# Render.com — production blueprint
# Dashboard: https://dashboard.render.com/blueprints
# Optional nightly DB backup: see render.backup.yaml
services:
  - type: web
    name: atoz-clinical
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: PostgreSQL
      - key: ConnectionStrings__ClinicalDatabase
        fromDatabase:
          name: atoz-clinical-db
          property: connectionString
      - key: ConnectionStrings__ReportingDatabase
        sync: false
      - key: Seed__VendorUsername
        value: vendor
      - key: Seed__VendorPassword
        generateValue: true
      - key: App__PublicBaseUrl
        value: https://atoz-clinical.onrender.com
      - key: AllowedHosts
        value: "atoz-clinical.onrender.com;*.onrender.com"
      - key: Email__Enabled
        value: "false"
      - key: Email__SmtpHost
        sync: false
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SmtpUser
        sync: false
      - key: Email__SmtpPassword
        sync: false
      - key: Email__FromAddress
        sync: false
      - key: Email__FromName
        value: A to Z Clinical
      - key: Captcha__Enabled
        value: "false"
      - key: Captcha__Provider
        value: hcaptcha
      - key: Captcha__SiteKey
        sync: false
      - key: Captcha__SecretKey
        sync: false
      - key: Billing__Enabled
        value: "true"
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      - key: Stripe__PriceIdStandard
        sync: false
      - key: Stripe__PriceIdProfessional
        sync: false
      - key: Operations__HealthToken
        generateValue: true
      - key: Operations__AlertWebhookUrl
        sync: false
      - key: Security__RequireMfaForAdmins
        value: "false"
      - key: Security__BaseDomain
        value: atoz-clinical.onrender.com
      - key: Authentication__Google__ClientId
        sync: false
      - key: Authentication__Google__ClientSecret
        sync: false
      - key: Authentication__Microsoft__ClientId
        sync: false
      - key: Authentication__Microsoft__ClientSecret
        sync: false

databases:
  - name: atoz-clinical-db
    region: oregon
    databaseName: atoz_clinical
    user: atoz
    # Omit plan so Render keeps the instance type already provisioned (starter legacy or basic-256mb).
