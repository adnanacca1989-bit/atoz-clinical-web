# Render.com — production blueprint (Phase 0)
# Apply in Render Dashboard: New > Blueprint > connect repo.
services:
  - type: web
    name: atoz-clinical
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Database__Provider
        value: PostgreSQL
      - key: ConnectionStrings__ClinicalDatabase
        fromDatabase:
          name: atoz-clinical-db
          property: connectionString
      - key: ConnectionStrings__ReportingDatabase
        sync: false
      - key: Seed__VendorUsername
        value: vendor
      - key: Seed__VendorPassword
        generateValue: true
      - key: App__PublicBaseUrl
        value: https://atoz-clinical.onrender.com
      - key: AllowedHosts
        value: atoz-clinical.onrender.com;*.onrender.com
      - key: Email__Enabled
        value: "true"
      - key: Email__SmtpHost
        sync: false
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SmtpUser
        sync: false
      - key: Email__SmtpPassword
        sync: false
      - key: Email__FromAddress
        sync: false
      - key: Email__FromName
        value: A to Z Clinical
      - key: Captcha__Enabled
        value: "true"
      - key: Captcha__Provider
        value: hcaptcha
      - key: Captcha__SiteKey
        sync: false
      - key: Captcha__SecretKey
        sync: false
      - key: Billing__Enabled
        value: "true"
      - key: Stripe__SecretKey
        sync: false
      - key: Stripe__WebhookSecret
        sync: false
      - key: Stripe__PriceIdStandard
        sync: false
      - key: Stripe__PriceIdProfessional
        sync: false
      - key: Operations__HealthToken
        generateValue: true
      - key: Operations__AlertWebhookUrl
        sync: false
      - key: Security__RequireMfaForAdmins
        value: "true"
      - key: Security__BaseDomain
        value: atoz-clinical.onrender.com
      - key: Authentication__Google__ClientId
        sync: false
      - key: Authentication__Google__ClientSecret
        sync: false
      - key: Authentication__Microsoft__ClientId
        sync: false
      - key: Authentication__Microsoft__ClientSecret
        sync: false

  - type: cron
    name: atoz-clinical-db-backup
    runtime: docker
    plan: starter
    schedule: "0 3 * * *"
    dockerfilePath: ./Dockerfile.backup
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: atoz-clinical-db
          property: connectionString
      - key: BACKUP_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-west-2

databases:
  - name: atoz-clinical-db
    plan: starter
    databaseName: atoz_clinical
    user: atoz
