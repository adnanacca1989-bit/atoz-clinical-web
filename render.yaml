# Render.com — connect this repo, add a PostgreSQL database, then deploy.
# Set ConnectionStrings__ClinicalDatabase from the Render Postgres "Internal Database URL".
services:
  - type: web
    name: atoz-clinical
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__ClinicalDatabase
        fromDatabase:
          name: atoz-clinical-db
          property: connectionString
      - key: Seed__VendorUsername
        value: vendor
      - key: Seed__VendorPassword
        generateValue: true
      - key: App__PublicBaseUrl
        value: https://atoz-clinical.onrender.com

databases:
  - name: atoz-clinical-db
    plan: free
    databaseName: atoz_clinical
    user: atoz
