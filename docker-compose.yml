services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atoz_clinical
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atoz_clinical"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "5034:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: "8080"
      ConnectionStrings__ClinicalDatabase: Host=db;Port=5432;Database=atoz_clinical;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      Seed__VendorUsername: vendor
      Seed__VendorPassword: ${VENDOR_PASSWORD:-ChangeMe@Local2026!}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
